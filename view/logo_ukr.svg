<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="2" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Background Card -->
    <rect x="25" y="25" width="150" height="150" rx="35" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="3" filter="url(#shadow)" />
    
    <!-- Gold Accent Circle -->
    <circle cx="100" cy="100" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" />
    
    <!-- Text Elements -->
    <text x="50%" y="105%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="url(#goldGrad)" opacity="0.8" style="letter-spacing: 4px;">PROJECT</text>
    <text x="50%" y="100" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="64" font-weight="900" fill="url(#goldGrad)">1000</text>
    
    <!-- Decorative Lines -->
    <path d="M70 135 L130 135" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
</svg>
