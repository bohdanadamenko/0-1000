<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вгадай число — Візуальна версія</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <div class="logo-container">
            <img src="logo_ukr.svg" alt="Логотип" class="main-logo">
        </div>
        <div id="start-screen" class="screen">
            <h1>Вгадай число</h1>
            <p>Загадайте число від 1 до 1000.<br>Я вгадаю його за 10 запитань.</p>
            <button id="start-btn" class="primary-btn">Я загадав!</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>
            <div class="stats">
                <span>Питання: <span id="question-count">0</span>/10</span>
                <span id="range-display" style="float: right; color: var(--accent-gold); font-size: 0.9em;">Діапазон: 1-1000</span>
            </div>
            <h2 id="question-text">Чи Ваше число БІЛЬШЕ ніж 500?</h2>
            <p style="font-size: 0.9rem; color: #ff8a8a; margin-top: -10px; margin-bottom: 20px;">
                * Якщо ваше число ТОЧНО дорівнює цьому, натискайте «НІ»
            </p>
            <div class="btn-group">
                <button id="yes-btn" class="action-btn">ТАК (>) </button>
                <button id="no-btn" class="action-btn">НІ (<) </button>
            </div>
            <button id="correct-btn" class="action-btn success-btn">Ви вгадали! 🎉</button>
        </div>

        <div id="result-screen" class="screen hidden">
            <h1 id="result-title">Ваше число: <span id="final-number"></span>!</h1>
            <div id="prize-container" class="hidden">
                <p class="prize-text">ВІТАЮ! ВИ ВИГРАЛИ:</p>
                <p class="bonus-text">+1000$ ПРЕМІЯ</p>
            </div>
            <div id="penalty-container" class="hidden">
                <p class="penalty-text">ШТРАФ! Ліміт вичерпано.</p>
                <div class="penalty-icon">❌</div>
                <p class="fine-text">-500$ ШТРАФ</p>
            </div>
            <button id="restart-btn" class="secondary-btn">Спробувати ще</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
